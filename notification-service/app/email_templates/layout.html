<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{title}}</title>
</head>

<body style="
    margin:0;
    padding:0;
    background-color:#F8FAFC;
    font-family:'Sarabun', 'TH Sarabun New', Tahoma, Arial, sans-serif;
    color:#334155;
">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation">
    <tr>
      <td align="center" style="padding:28px 16px;">

        <table width="600" cellpadding="0" cellspacing="0" border="0" role="presentation"
          style="
            max-width:600px;
            width:100%;
            background:#FFFFFF;
            border:1px solid #E2E8F0;
            border-radius:4px;
            overflow:hidden;
          "
        >

          <!-- แถบสีประจำหน่วยงาน -->
          <tr>
            <td style="background:#BE185D; height:4px; font-size:0; line-height:0;">&nbsp;</td>
          </tr>

          <!-- หัวจดหมายราชการ -->
          <tr>
            <td style="padding:28px 32px 24px; background:#FFFFFF;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation">
                <tr>
                  <td width="88" valign="top" style="padding-right:20px;">
                    <table cellpadding="0" cellspacing="0" border="0" role="presentation">
                      <tr>
                        <td align="center" style="
                            width:80px;
                            height:80px;
                            border:2px solid rgba(190,24,93,0.2);
                            border-radius:50%;
                            background:#FFFFFF;
                          ">
                          <img
                            src="{{logo_url}}"
                            alt="ตราสัญลักษณ์กระทรวงการพัฒนาสังคมและความมั่นคงของมนุษย์"
                            width="72"
                            height="72"
                            style="display:block; margin:0 auto; object-fit:contain;"
                          />
                        </td>
                      </tr>
                    </table>
                  </td>
                  <td valign="middle">
                    <p style="
                        margin:0 0 6px;
                        font-size:13px;
                        line-height:1.5;
                        color:#64748B;
                        letter-spacing:0.01em;
                      ">
                      กระทรวงการพัฒนาสังคมและความมั่นคงของมนุษย์
                    </p>
                    <p style="margin:0 0 4px; font-size:24px; line-height:1.2; font-weight:700;">
                      <span style="color:#BE185D;">พม.</span><span style="color:#0F172A;"> CARE</span>
                    </p>
                    <p style="
                        margin:0;
                        font-size:13px;
                        line-height:1.5;
                        color:#64748B;
                      ">
                      ระบบขอรับความช่วยเหลือด้วยตนเอง
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:0 32px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation">
                <tr>
                  <td style="border-top:1px solid #E2E8F0; font-size:0; line-height:0;">&nbsp;</td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:8px 32px 12px;">
              <p style="
                  margin:0;
                  font-size:18px;
                  font-weight:700;
                  color:#0F172A;
                  line-height:1.4;
                ">
                {{header_title}}
              </p>
            </td>
          </tr>

          <tr>
            <td style="padding:8px 32px 32px; font-size:16px; line-height:1.75; color:#334155;">
              {{content}}
            </td>
          </tr>

          <tr>
            <td style="
                background:#F1F5F9;
                border-top:1px solid #E2E8F0;
                padding:20px 32px;
                text-align:center;
                font-size:13px;
                line-height:1.7;
                color:#64748B;
              ">
              <p style="margin:0 0 8px; color:#334155; font-weight:600;">
                {{footer_text}}
              </p>
              <p style="margin:0; font-size:12px;">
                อีเมลฉบับนี้ส่งโดยระบบอัตโนมัติ กรุณาอย่าตอบกลับ<br/>
                กระทรวงการพัฒนาสังคมและความมั่นคงของมนุษย์
              </p>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
