{{province_total_block}}

<table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation"

      margin:24px 0 16px;
      background:#FDF2F8;
      border:1px solid #FBCFE8;
      border-left:4px solid #BE185D;
      border-radius:2px;
  "
>
  <tr>
    <td style="padding:18px 20px;">
      <p style="margin:0; color:#9D174D; font-size:13px; font-weight:600; letter-spacing:0.02em;">
        {{highlight_label}}
      </p>
      <p style="
          margin:8px 0 0;
          font-size:32px;
          font-weight:700;
          color:#BE185D;
          line-height:1.2;
      ">
        {{highlight_count}} <span style="font-size:18px; font-weight:600; color:#9D174D;">รายการ</span>
      </p>
    </td>
  </tr>
</table>

<table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation"
  style="
      margin:0 0 24px;
      background:#FFF7ED;
      border:1px solid #FED7AA;
      border-left:4px solid #EA580C;
      border-radius:2px;
  "
>
  <tr>
    <td style="padding:18px 20px;">
      <p style="margin:0; color:#9A3412; font-size:13px; font-weight:600; letter-spacing:0.02em;">
        {{emergency_label}}
      </p>
      <p style="
          margin:8px 0 0;
          font-size:28px;
          font-weight:700;
          color:#EA580C;
          line-height:1.2;
      ">
        {{emergency_count}} <span style="font-size:17px; font-weight:600; color:#9A3412;">รายการ</span>
      </p>
     
    </td>
  </tr>
</table>
