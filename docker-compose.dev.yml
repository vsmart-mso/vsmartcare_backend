# ใช้คู่กับ docker-compose.yml เพื่อให้แก้โค้ดแล้วสะท้อนใน container ทันที (ไม่ต้อง rebuild)
# docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# docker compose -f docker-compose.yml -f docker-compose.dev.yml down
#
# PYTHONPATH: uvicorn --reload สปอว์น subprocess ถ้าไม่มีค่านี้มักได้ ModuleNotFoundError: No module named 'app'
services:
  bff-vsmartcare:
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./bff-vsmartcare/app:/app/app
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  case-service:
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./case-service/app:/app/app
      - ./case-service/alembic:/app/alembic
      - ./case-service/alembic.ini:/app/alembic.ini
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && exec python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload",
      ]

  notification-service:
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./notification-service/app:/app/app
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  thaid-auth-service:
    environment:
      - PYTHONPATH=/app
      # กัน merge compose ทำให้ค่าจาก docker-compose.yml หาย — ต้องตรงกับ case-service / postgres
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/case_service
    volumes:
      - ./thaid-auth-service/app:/app/app
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  ocr-service:
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/case_service
    volumes:
      - ./ocr-service/app:/app/app
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
