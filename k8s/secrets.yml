# DO NOT COMMIT THIS FILE — add k8s/secrets.yml to .gitignore
# Apply with: kubectl apply -f k8s/secrets.yml
# stringData values are plain text (Kubernetes encodes to base64 automatically)

apiVersion: v1
kind: Secret
metadata:
  namespace: vcare
  name: vcare-bff-secret
type: Opaque
stringData:
  BFF_API_PREFIX: "/api-vsmartcare"
  BFF_API_PASSWORD: "change-me"
  CASE_SERVICE_URL: "http://vcare-case-service:8000"
  NOTIFICATION_SERVICE_URL: "http://vcare-notification-service:8000"
  THAID_AUTH_SERVICE_URL: "http://vcare-thaid-auth-service:8000"
  OCR_SERVICE_URL: "http://vcare-ocr-service:8000"
  DASHBOARD_SERVICE_URL: "http://vcare-dashboard-service:8000"
  FRONTEND_URL: "https://change-me.example.com"
  BFF_CORS_ORIGINS: "https://change-me.example.com"
---
apiVersion: v1
kind: Secret
metadata:
  namespace: vcare
  name: vcare-case-service-secret
type: Opaque
stringData:
  SERVICE_NAME: "case-service"
  PORT: "8000"
  DATABASE_URL: "postgresql+asyncpg://user:password@postgres:5432/case_service"
  ADMIN_JWT_SECRET: "change-me"
  NOTIFICATION_SERVICE_URL: "http://vcare-notification-service:8000"
  COOLDOWN_DAYS: "30"
  MSO_LOGBOOK_BASE_URL: ""
  MSO_LOGBOOK_API_KEY: ""
  VSMART_MAIN_BASE_URL: ""
  VSMART_MAIN_API_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  namespace: vcare
  name: vcare-notification-service-secret
type: Opaque
stringData:
  EMAIL_MODE: "smtp"
  EMAIL_AUTO_SEND: "true"
  SMTP_HOST: "change-me.smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: "change-me"
  SMTP_PASSWORD: "change-me"
  SMTP_FROM: "noreply@example.com"
  SMTP_USE_TLS: "true"
  SMTP_USE_SSL: "false"
  FRONTEND_URL: "https://change-me.example.com"
---
apiVersion: v1
kind: Secret
metadata:
  namespace: vcare
  name: vcare-ocr-service-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://user:password@postgres:5432/case_service"
  GEMINI_API_KEY: "change-me"
  GEMINI_MODEL: "gemini-2.0-flash-lite"
  OCR_API_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  namespace: vcare
  name: vcare-thaid-auth-service-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://user:password@postgres:5432/case_service"
  THAID_CLIENT_ID: "change-me"
  THAID_CLIENT_SECRET: "change-me"
  THAID_SERVER_METADATA_URL: "https://imauth.bora.dopa.go.th/.well-known/openid-configuration"
  THAID_REDIRECT_URI: "https://change-me.example.com/v1/auth/thaid/callback"
  THAID_JWT_SECRET: "change-me"
  THAID_POST_LOGIN_REDIRECT: "https://change-me.example.com/login/thaid/return"
  THAID_CORS_ORIGINS: "https://change-me.example.com"
  THAID_USE_MOCK: "false"
---
apiVersion: v1
kind: Secret
metadata:
  namespace: vcare
  name: vcare-dashboard-service-secret
type: Opaque
stringData:
  SERVICE_NAME: "dashboard-service"
  PORT: "8000"
  DATABASE_URL: "postgresql+asyncpg://user:password@postgres:5432/case_service"
