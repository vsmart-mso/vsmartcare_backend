# พัฒนาแบบ hot-reload: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
version: "3.9"

services:
  bff-vsmartcare:
    image: service-bff-vsmartcare:latest
    build:
      context: ./bff-vsmartcare
    environment:
      - PORT=8000
      - BFF_API_PASSWORD=${BFF_API_PASSWORD:-}
      - CASE_SERVICE_URL=http://case-service:8000
      - NOTIFICATION_SERVICE_URL=http://notification-service:8000
      - THAID_AUTH_SERVICE_URL=http://thaid-auth-service:8000
    ports:
      - "8000:8000"
    depends_on:
      - case-service
      - notification-service
      - thaid-auth-service

  case-service:
    image: service-case-service:latest
    build:
      context: ./case-service
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/case_service
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: case_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d case_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  notification-service:
    image: service-notification-service:latest
    build:
      context: ./notification-service
    environment:
      - PORT=8000
    ports:
      - "8002:8000"

  thaid-auth-service:
    image: service-thaid-auth-service:latest
    build:
      context: ./thaid-auth-service
    env_file:
      # ค่า THAID_* / THAID_USE_MOCK — ต้องมีไฟล์นี้ (คัดลอกจาก .env.example ในโฟลเดอร์ service เดียวกัน)
      - ./thaid-auth-service/.env
    environment:
      - PORT=8000
    ports:
      - "8003:8000"

volumes:
  postgres_data:

