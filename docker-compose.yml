# พัฒนา hot-reload: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# อีเมลจำลอง (Mailpit): dev.yml ตั้ง SMTP_HOST=mailpit — ดู http://localhost:8025
# อีเมล Gmail จริง: เพิ่ม -f docker-compose.smtp-gmail.yml ท้ายสุด หรืออย่าใช้ dev.yml กับ notification
version: "3.9"

services:
  bff-vsmartcare:
    image: service-bff-vsmartcare:latest
    build:
      context: ./bff-vsmartcare
    env_file:
      # แชร์ OCR_SERVICE_API_KEY กับ ocr-service (service-to-service auth)
      - path: ./ocr-service/.env
        required: false
    environment:
      - PORT=8000
      - BFF_API_PASSWORD=${BFF_API_PASSWORD:-}
      - STAFF_INTERNAL_API_KEY=${STAFF_INTERNAL_API_KEY:-}
      - CASE_SERVICE_URL=http://case-service:8000
      - NOTIFICATION_SERVICE_URL=http://notification-service:8000
      - THAID_AUTH_SERVICE_URL=http://thaid-auth-service:8000
      - OCR_SERVICE_URL=http://ocr-service:8000
      - DASHBOARD_SERVICE_URL=http://dashboard-service:8000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "8000:8000"
    depends_on:
      - case-service
      - notification-service
      - thaid-auth-service
      - ocr-service
      - dashboard-service

  case-service:
    image: service-case-service:latest
    build:
      context: ./case-service
    environment:
      # ทับค่าใน .env เวลารันด้วย compose — host ต้องเป็น `postgres` ไม่ใช่ localhost
      - SERVICE_NAME=case-service
      - PORT=8000
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/case_service
      - NOTIFICATION_SERVICE_URL=http://notification-service:8000
      - STATUS_EMAIL_ENABLED=true
      - STATUS_EMAIL_TIMEOUT_SECONDS=5
      - COOLDOWN_DAYS=30
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET:-dev-admin-jwt-secret-change-in-production}
      - STAFF_JWT_SECRET=${STAFF_JWT_SECRET:-dev-staff-jwt-secret-change-in-production}
      - STAFF_INTERNAL_API_KEY=${STAFF_INTERNAL_API_KEY:-}
      - THAID_JWT_SECRET=${THAID_JWT_SECRET:-dev-thaid-jwt-secret-change-in-production}
      - ADMIN_JWT_EXPIRE_MINUTES=480
      - CHECK_CASE_ENABLE_MSO_LOGBOOK=false
      # CHECK_CASE_ENABLE_* ตั้งใน case-service/.env (อย่า hardcode ที่นี่ — จะทับ .env)
      - VSMART_MAIN_API_KEY=${VSMART_MAIN_API_KEY:-}
      - CHECK_CASE_ENABLE_VCARE_SELF=true
      - EXTERNAL_CHECK_TIMEOUT_SECONDS=10
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      notification-service:
        condition: service_started
    env_file:
      - ./case-service/.env

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: case_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d case_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  notification-service:
    image: service-notification-service:latest
    build:
      context: ./notification-service
    env_file:
      - path: ./notification-service/.env
        required: false
    environment:
      - PORT=8000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173/}
      # ไม่มี .env → ใช้ default ใน app: EMAIL_MODE=log
      # ส่งจริง: สร้าง notification-service/.env จาก smtp.env.example
    ports:
      - "8002:8000"

  ocr-service:
    image: service-ocr-service:latest
    build:
      context: ./ocr-service
    env_file:
      - path: ./ocr-service/.env
        required: false
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/case_service
      # GEMINI_API_KEY / OCR_API_KEY — ตั้งใน ocr-service/.env เท่านั้น
      # อย่าใส่ ${GEMINI_API_KEY:-} ที่นี่ (ค่าว่างจะทับ env_file)
      - APP_ENV=${APP_ENV:-development}
    ports:
      - "8004:8000"
    depends_on:
      postgres:
        condition: service_healthy

  thaid-auth-service:
    image: service-thaid-auth-service:latest
    build:
      context: ./thaid-auth-service
    env_file:
      - ./thaid-auth-service/.env
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/case_service
      - THAID_JWT_SECRET=${THAID_JWT_SECRET:-dev-thaid-jwt-secret-change-in-production}
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # อ่านอย่างเดียวจาก DB ของ case-service — สรุปจำนวนคำร้องรายจังหวัด/อำเภอ สำหรับหน้า dashboard
  dashboard-service:
    image: service-dashboard-service:latest
    build:
      context: ./dashboard-service
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/case_service
    ports:
      - "8005:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

